  [manifest]
  version = "1.0.0"
  dump_lua = true
  priority = 1


  [[patches]]
  [patches.pattern]
  target = "functions/misc_functions.lua"
  pattern = '''joker_slots = 5,'''
  position = "at"
  payload = '''joker_slots = 1,'''
  match_indent = true
  times = 1


  [[patches]]
  [patches.pattern]
  target = "functions/common_events.lua"
  pattern = '''G.GAME.round_resets.ante = G.GAME.round_resets.ante + mod'''
  position = "after"
  payload = '''
  if G.jokers then
           G.jokers.config.card_limit = G.jokers.config.card_limit + mod
       end
  '''
  match_indent = true
  times = 1
